  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Framer's runtime overwrites window.fetch during its own init, discarding
    // a plain assignment. Use defineProperty so our UUID interception persists:
    // any reassignment to window.fetch updates currentFetch (the inner target)
    // while the intercepting wrapper stays in the getter.
    (function() {
      var nativeFetch = window.fetch;
      var currentFetch = nativeFetch;
      function intercepted(url, init) {
        var u = typeof url === 'string' ? url : (url && (url.href || url.url)) || '';
        if (u.indexOf('"') !== -1 || u.indexOf('%22') !== -1) {
          for (var id in blobUrls) {
            if (u.indexOf(id) !== -1) return nativeFetch.call(this, blobUrls[id], init);
          }
        }
        return currentFetch.apply(this, arguments);
      }
      try {
        Object.defineProperty(window, 'fetch', {
          get: function() { return intercepted; },
          set: function(fn) { currentFetch = fn; },
          configurable: true
        });
      } catch(e) { window.fetch = intercepted; }
    })();

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
    // Rename src="{{ ... }}" to sc-camel-src="{{ ... }}" so the browser won't fetch
    // the literal template expression before the dc-runtime resolves bindings.
    // The dc-runtime maps sc-camel-* attributes back to their camelCase names,
    // so sc-camel-src becomes src in the rendered output.
    template = template.replace(/ src="(\{\{[^"]*\}\})"/g, ' sc-camel-src="$1"');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ly: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"993689ec-51a0-4762-9477-2c01494a7269\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a8ad82ba-afa7-4d88-a01f-b93c6b94150b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d1975f70-4f54-4e55-9b93-0d7de3150314\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"924c2001-5fa2-4230-ba2a-97410d696189\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   LAMBO — Color tokens\n   Monochrome-plus-gold. True black is the canvas; white & gold\n   are the only relief. Neutrals stay achromatic (pure gray).\n   ============================================================ */\n:root {\n  /* ---- Brand / accent ---- */\n  --accent: #D4A017;\n  --gold: #D4A017;          /* Warmer gold — refined from #FFC000 */\n  --gold-dark: #A87800;     /* hover/pressed state for gold */\n  --gold-text: #E0B835;     /* lighter gold for inline text accents */\n\n  /* ---- Core ---- */\n  --white: #FFFFFF;\n  --black: #000000;         /* absolute black — the canvas */\n\n  /* ---- Dark surfaces (the \"darkness gradient\") ---- */\n  --iron: #181818;          /* dark iron — footer, deep sections */\n  --charcoal: #202020;      /* elevated dark surface — cards, panels */\n  --graphite: #313131;      /* shadow gray — dividers, faint text on dark */\n  --gray-700: #494949;      /* graphite text on light */\n  --gray-600: #555555;      /* iron body-text variant */\n  --gray-550: #666666;      /* slate */\n  --gray-500: #7D7D7D;      /* ash — muted text, metadata */\n  --gray-400: #969696;      /* steel — disabled, subtle labels, gray buttons */\n\n  /* ---- Light surfaces (the exception) ---- */\n  --near-white: #F8F8F8;\n  --mist: #E6E6E6;\n  --smoke: #F5F5F5;\n\n  /* ---- Secondary accents (sparing) ---- */\n  --cyan: #29ABE2;          /* informational accent / interactive highlight */\n  --teal: #1EAEDB;          /* ghost-button hover background */\n  --link-blue: #3860BE;     /* universal link hover */\n\n  /* ---- Overlays ---- */\n  --overlay-70: rgba(0,0,0,0.70);\n  --overlay-50: rgba(0,0,0,0.50);\n  --overlay-25: rgba(0,0,0,0.25);\n  --border-white-50: rgba(255,255,255,0.50);\n\n  /* ============================================================\n     Semantic aliases — prefer these in components\n     ============================================================ */\n  --surface-page: var(--black);\n  --surface-card: var(--charcoal);\n  --surface-deep: var(--iron);\n  --surface-light: var(--near-white);\n\n  --text-primary: var(--white);\n  --text-secondary: var(--smoke);\n  --text-muted: var(--gray-500);\n  --text-disabled: var(--gray-400);\n  --text-on-light: var(--graphite);\n  --text-accent: var(--gold-text);\n\n  --action-primary: var(--gold);\n  --action-primary-hover: var(--gold-dark);\n  --action-primary-text: var(--black);\n  --action-ghost-hover: var(--teal);\n\n  --border-subtle: var(--charcoal);\n  --border-divider: var(--graphite);\n  --border-ghost: var(--border-white-50);\n  --border-input: #DDDDDD;\n\n  --link-hover: var(--link-blue);\n  --focus-ring: var(--cyan);\n}\n\n/* ============================================================\n   LAMBO — Typography tokens\n   Single-typeface discipline. SHOUTING uppercase at scale,\n   weight 400 carries headlines, tight line-heights.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Saira SemiCondensed', 'Saira', 'Roboto', 'Helvetica Neue', Arial, sans-serif;\n  --font-compressed: 'Saira Condensed', 'Saira SemiCondensed', 'Roboto Condensed', sans-serif;\n  --font-ui: 'Saira', 'Roboto', 'Helvetica Neue', Arial, sans-serif;\n  --font-body: 'Saira', 'Open Sans', 'Helvetica Neue', Arial, sans-serif;\n\n  /* ---- Weights ---- */\n  --fw-light: 300;     /* @kind font */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium: 500;    /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n  --fw-black: 800;     /* @kind font */\n\n  /* ---- Type scale (size) ---- */\n  --fs-hero: 120px;      /* @kind font */\n  --fs-display: 80px;    /* @kind font */\n  --fs-title: 54px;      /* @kind font */\n  --fs-subtitle: 40px;   /* @kind font */\n  --fs-heading: 27px;    /* @kind font */\n  --fs-card-title: 24px; /* @kind font */\n  --fs-body-lg: 18px;    /* @kind font */\n  --fs-body: 16px;       /* @kind font */\n  --fs-button: 16px;     /* @kind font */\n  --fs-button-sm: 14.4px;/* @kind font */\n  --fs-caption: 14px;    /* @kind font */\n  --fs-label: 12px;      /* @kind font */\n  --fs-micro: 10px;      /* @kind font */\n\n  /* ---- Line-heights ---- */\n  --lh-hero: 0.92;       /* @kind font */\n  --lh-display: 1.13;    /* @kind font */\n  --lh-title: 1.19;      /* @kind font */\n  --lh-subtitle: 1.15;   /* @kind font */\n  --lh-heading: 1.37;    /* @kind font */\n  --lh-card-title: 1.30; /* @kind font */\n  --lh-body-lg: 1.56;    /* @kind font */\n  --lh-body: 1.50;       /* @kind font */\n  --lh-button: 1.50;     /* @kind font */\n  --lh-button-sm: 1.00;  /* @kind font */\n  --lh-caption: 1.20;    /* @kind font */\n  --lh-label: 1.83;      /* @kind font */\n  --lh-micro: 1.60;      /* @kind font */\n\n  /* ---- Letter-spacing ---- */\n  --ls-tight: -0.42px;   /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-button: 0.2px;    /* @kind font */\n  --ls-label: 0.96px;    /* @kind font */\n  --ls-micro: 0.225px;   /* @kind font */\n\n  /* ---- Semantic roles ---- */\n  --text-transform-display: uppercase;\n}\n\n/* ============================================================\n   LAMBO — Spacing & layout tokens\n   Base unit 8px. Darkness IS the whitespace.\n   ============================================================ */\n:root {\n  --space-2: 2px;\n  --space-4: 4px;\n  --space-5: 5px;\n  --space-8: 8px;\n  --space-10: 10px;\n  --space-12: 12px;\n  --space-15: 15px;\n  --space-16: 16px;\n  --space-20: 20px;\n  --space-24: 24px;\n  --space-32: 32px;\n  --space-40: 40px;\n  --space-48: 48px;\n  --space-56: 56px;\n  --space-64: 64px;\n  --space-80: 80px;\n\n  /* ---- Layout ---- */\n  --container-max: 1200px;\n  --container-wide: 1440px;\n  --section-pad-y: 56px;\n  --section-pad-x: 40px;\n\n  /* ---- Touch targets ---- */\n  --touch-min: 48px;\n}\n\n/* ============================================================\n   LAMBO — Effects: radii, elevation, motion\n   Sharp angles are non-negotiable. Depth comes from surface\n   color layering, not shadows. Color-only interactions.\n   ============================================================ */\n:root {\n  /* ---- Border radius ---- */\n  --radius-0: 0px;       /* default for everything */\n  --radius-1: 1px;       /* subtle spans */\n  --radius-2: 2px;       /* badges, close buttons */\n  --radius-switch: 20px; /* toggle switches — the ONLY rounded element */\n\n  /* ---- Borders ---- */\n  --border-hairline: 1px;\n  --border-ghost-width: 1px;\n\n  /* ---- Elevation (darkness gradient, not shadows) ---- */\n  --elev-0: var(--black);             /* abyss — page background */\n  --elev-1: var(--charcoal);          /* surface — cards, panels */\n  --elev-1-alt: var(--iron);          /* deep sections, footer */\n  --elev-overlay: rgba(0,0,0,0.70);   /* modal backdrop, video dim */\n  --elev-fog: rgba(0,0,0,0.50);\n  --elev-mist: rgba(0,0,0,0.25);\n\n  /* The rare real shadow (light-mode surfaces only) */\n  --shadow-light: 0 2px 8px rgba(0,0,0,0.12);\n\n  /* ---- Motion: color-only, no scale/translate ---- */\n  --ease-standard: cubic-bezier(0.4, 0.0, 0.2, 1); /* @kind other */\n  --dur-fast: 120ms;  /* @kind other */\n  --dur-base: 200ms;  /* @kind other */\n  --dur-slow: 320ms;  /* @kind other */\n  --transition-color: background-color var(--dur-base) var(--ease-standard),\n                      color var(--dur-base) var(--ease-standard),\n                      opacity var(--dur-base) var(--ease-standard),\n                      border-color var(--dur-base) var(--ease-standard);\n}\n\n/* ============================================================\n   LAMBO — Base resets & primitives\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-primary);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  font-weight: var(--fw-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display headline helper — the SHOUTING voice */\n.lambo-display {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-weight: var(--fw-regular);\n  letter-spacing: var(--ls-normal);\n}\n\na {\n  color: var(--white);\n  text-decoration: none;\n  trans
