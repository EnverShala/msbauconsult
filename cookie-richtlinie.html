  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      /* informational accent / interactive highlight */\n  --teal: #1EAEDB;          /* ghost-button hover background */\n  --link-blue: #3860BE;     /* universal link hover */\n\n  /* ---- Overlays ---- */\n  --overlay-70: rgba(0,0,0,0.70);\n  --overlay-50: rgba(0,0,0,0.50);\n  --overlay-25: rgba(0,0,0,0.25);\n  --border-white-50: rgba(255,255,255,0.50);\n\n  /* ============================================================\n     Semantic aliases — prefer these in components\n     ============================================================ */\n  --surface-page: var(--black);\n  --surface-card: var(--charcoal);\n  --surface-deep: var(--iron);\n  --surface-light: var(--near-white);\n\n  --text-primary: var(--white);\n  --text-secondary: var(--smoke);\n  --text-muted: var(--gray-500);\n  --text-disabled: var(--gray-400);\n  --text-on-light: var(--graphite);\n  --text-accent: var(--gold-text);\n\n  --action-primary: var(--gold);\n  --action-primary-hover: var(--gold-dark);\n  --action-primary-text: var(--black);\n  --action-ghost-hover: var(--teal);\n\n  --border-subtle: var(--charcoal);\n  --border-divider: var(--graphite);\n  --border-ghost: var(--border-white-50);\n  --border-input: #DDDDDD;\n\n  --link-hover: var(--link-blue);\n  --focus-ring: var(--cyan);\n}\n<\/style>\n  <style>/* ============================================================\n   LAMBO — Typography tokens\n   Single-typeface discipline. SHOUTING uppercase at scale,\n   weight 400 carries headlines, tight line-heights.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Saira SemiCondensed', 'Saira', 'Roboto', 'Helvetica Neue', Arial, sans-serif;\n  --font-compressed: 'Saira Condensed', 'Saira SemiCondensed', 'Roboto Condensed', sans-serif;\n  --font-ui: 'Saira', 'Roboto', 'Helvetica Neue', Arial, sans-serif;\n  --font-body: 'Saira', 'Open Sans', 'Helvetica Neue', Arial, sans-serif;\n\n  /* ---- Weights ---- */\n  --fw-light: 300;     /* @kind font */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium: 500;    /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n  --fw-black: 800;     /* @kind font */\n\n  /* ---- Type scale (size) ---- */\n  --fs-hero: 120px;      /* @kind font */\n  --fs-display: 80px;    /* @kind font */\n  --fs-title: 54px;      /* @kind font */\n  --fs-subtitle: 40px;   /* @kind font */\n  --fs-heading: 27px;    /* @kind font */\n  --fs-card-title: 24px; /* @kind font */\n  --fs-body-lg: 18px;    /* @kind font */\n  --fs-body: 16px;       /* @kind font */\n  --fs-button: 16px;     /* @kind font */\n  --fs-button-sm: 14.4px;/* @kind font */\n  --fs-caption: 14px;    /* @kind font */\n  --fs-label: 12px;      /* @kind font */\n  --fs-micro: 10px;      /* @kind font */\n\n  /* ---- Line-heights ---- */\n  --lh-hero: 0.92;       /* @kind font */\n  --lh-display: 1.13;    /* @kind font */\n  --lh-title: 1.19;      /* @kind font */\n  --lh-subtitle: 1.15;   /* @kind font */\n  --lh-heading: 1.37;    /* @kind font */\n  --lh-card-title: 1.30; /* @kind font */\n  --lh-body-lg: 1.56;    /* @kind font */\n  --lh-body: 1.50;       /* @kind font */\n  --lh-button: 1.50;     /* @kind font */\n  --lh-button-sm: 1.00;  /* @kind font */\n  --lh-caption: 1.20;    /* @kind font */\n  --lh-label: 1.83;      /* @kind font */\n  --lh-micro: 1.60;      /* @kind font */\n\n  /* ---- Letter-spacing ---- */\n  --ls-tight: -0.42px;   /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-button: 0.2px;    /* @kind font */\n  --ls-label: 0.96px;    /* @kind font */\n  --ls-micro: 0.225px;   /* @kind font */\n\n  /* ---- Semantic roles ---- */\n  --text-transform-display: uppercase;\n}\n<\/style>\n  <style>/* ============================================================\n   LAMBO — Base resets & primitives\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-primary);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  font-weight: var(--fw-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display headline helper — the SHOUTING voice */\n.lambo-display {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-weight: var(--fw-regular);\n  letter-spacing: var(--ls-normal);\n}\n\na {\n  color: var(--white);\n  text-decoration: none;\n  transition: color var(--dur-base) var(--ease-standard);\n}\na:hover { color: var(--link-hover); }\n\n::selection { background: var(--gold); color: var(--black); }\n<\/style>\n  <script src=\"d32a447c-cf5b-4dbf-bf26-7fc676b7ed05\"><\/script>\n  <style>\n    *{box-sizing:border-box}\n    html{scroll-behavior:smooth}\n    body{margin:0;font-family:'Saira','Helvetica Neue',Arial,sans-serif;color:#fff;background:#000;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n    img{display:block;max-width:100%}\n    a{color:inherit}\n    table{border-collapse:collapse;width:100%}\n  <\/style>\n<\/helmet>\n\n\n<div style=\"background:#000;min-height:100vh;display:flex;flex-direction:column\">\n\n  <header style=\"position:sticky;top:0;z-index:1000;background:rgba(8,8,8,.92);backdrop-filter:blur(6px);border-bottom:1px solid #1f1f1f\">\n    <div style=\"max-width:860px;margin:0 auto;padding:0 clamp(20px,5vw,48px);height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px\">\n      <a href=\"index.html\" style=\"display:flex;align-items:center;text-decoration:none;flex-shrink:0\">\n        <img src=\"assets/cropped-Logo_trans-250x83.png\" alt=\"MS Bauconsult\" style=\"height:34px;width:auto;filter:brightness(0) invert(1)\">\n      <\/a>\n      <a href=\"index.html\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:#cfcfcf;transition:color .2s\" style-hover=\"color: var(--accent,#FFC000)\"><span style=\"font-size:16px\">←<\/span> Zur Startseite<\/a>\n    <\/div>\n  <\/header>\n\n  <section style=\"border-bottom:1px solid #1a1a1a;padding:clamp(48px,8vw,88px) 0 clamp(36px,5vw,52px)\">\n    <div style=\"max-width:860px;margin:0 auto;padding:0 clamp(20px,5vw,48px)\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"width:42px;height:2px;background:var(--accent,#FFC000)\"><\/span>\n        <span style=\"font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent,#FFC000)\">Rechtliches<\/span>\n      <\/div>\n      <h1 style=\"margin:0;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:clamp(34px,5.4vw,64px);line-height:1.02;letter-spacing:-.5px;text-transform:uppercase\">Cookie-Richtlinie (EU)<\/h1>\n      <p style=\"margin:22px 0 0;font-size:15px;line-height:1.7;color:#8a8a8a;font-style:italic\">Diese Cookie-Richtlinie wurde zuletzt am 4. Mai 2025 aktualisiert und gilt für Bürger und Einwohner mit ständigem Wohnsitz im Europäischen Wirtschaftsraum und der Schweiz.<\/p>\n    <\/div>\n  <\/section>\n\n  <main style=\"flex:1 1 auto;padding:clamp(44px,7vw,80px) 0 clamp(64px,10vw,120px)\">\n    <div style=\"max-width:860px;margin:0 auto;padding:0 clamp(20px,5vw,48px);display:flex;flex-direction:column;gap:clamp(30px,4vw,44px)\">\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">1. Einführung<\/h2>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Unsere Website, <a href=\"https://ms-bauconsult.de\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;color:var(--accent,#FFC000)\">https://ms-bauconsult.de<\/a> (im Folgenden: „Die Website“) verwendet Cookies und ähnliche Technologien (der Einfachheit halber werden all diese unter „Cookies“ zusammengefasst). Cookies werden außerdem von uns beauftragten Drittparteien platziert. In dem unten stehenden Dokument informieren wir Sie über die Verwendung von Cookies auf unserer Website.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">2. Was sind Cookies?<\/h2>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Ein Cookie ist eine einfache kleine Datei, die gemeinsam mit den Seiten einer Internetadresse versendet und vom Webbrowser auf dem PC oder einem anderen Gerät gespeichert werden kann. Die darin gespeicherten Informationen können während folgender Besuche zu unseren oder den Servern relevanter Drittanbieter gesendet werden.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">3. Was sind Skripte?<\/h2>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Ein Script ist ein Stück Programmcode, das benutzt wird, um unserer Website Funktionalität und Interaktivität zu ermöglichen. Dieser Code wird auf unseren Servern oder auf Ihrem Gerät ausgeführt.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">4. Was ist ein Web Beacon?<\/h2>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Ein Web-Beacon (auch Pixel-Tag genannt) ist ein kleines unsichtbares Textfragment oder Bild auf einer Website, das benutzt wird, um den Verkehr auf der Website zu überwachen. Um dies zu ermöglichen, werden diverse Daten von Ihnen mittels Web-Beacons gespeichert.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">5. Cookies<\/h2>\n        <h3 style=\"margin:0 0 10px;font-family:'Saira','sans-serif';font-weight:600;font-size:17px;color:#e6e6e6\">5.1 Technische oder funktionelle Cookies<\/h3>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Einige Cookies stellen sicher, dass bestimmte Teile der Website ordnungsgemäß funktionieren und Ihre Benutzereinstellungen weiterhin in Erinnerung bleiben. Durch das Setzen funktionaler Cookies erleichtern wir Ihnen den Besuch unserer Website. Auf diese Weise müssen Sie beim Besuch unserer Website nicht wiederholt dieselben Informationen eingeben. Wir können diese Cookies ohne Ihre Einwilligung platzieren.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 20px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">6. Platzierte Cookies<\/h2>\n\n        <div style=\"display:flex;flex-direction:column;gap:18px\">\n          <p style=\"font-size:16px;line-height:1.85;color:#a8a8a8;margin:0\">\n            Diese Website verwendet <strong style=\"color:#fff\">keine eigenen Cookies<\/strong>. Es werden keine Tracking-, Analyse- oder Marketing-Cookies gesetzt.<br><br>\n            Das Kontaktformular übermittelt die eingegebenen Daten (Name, E-Mail-Adresse, Telefonnummer, Nachricht) über den Dienst <strong style=\"color:#fff\">Web3Forms<\/strong> (web3forms.com) an <strong style=\"color:#fff\">info@ms-bauconsult.de<\/strong>. Dabei werden keine Cookies gesetzt oder gespeichert. Weitere Informationen finden Sie in der <a href=\"datenschutz.html\" style=\"color:var(--accent,#FFC000);text-decoration:none\">Datenschutzerklärung<\/a>.\n          <\/p>\n        <\/div>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">7. Einwilligung<\/h2>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Da diese Website keine Cookies setzt, ist keine aktive Einwilligung erforderlich. Die freiwillige Übermittlung Ihrer Daten über das Kontaktformular stellt eine Einwilligung zur einmaligen Kontaktaufnahme dar (Art. 6 Abs. 1 lit. a DSGVO). Sie können die Verwendung des Kontaktformulars jederzeit unterlassen und stattdessen direkt per E-Mail oder Telefon Kontakt aufnehmen.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">8. Aktivierung / Deaktivierung und Löschen von Cookies<\/h2>\n        <p style=\"margin:0 0 14px;font-size:16px;line-height:1.85;color:#a8a8a8\">Sie können Ihren Internetbrowser verwenden, um automatisch oder manuell Cookies zu löschen. Sie können außerdem spezifizieren, ob spezielle Cookies nicht platziert werden sollen. Eine andere Möglichkeit ist es, Ihren Internetbrowser derart einzurichten, dass Sie jedes Mal benachrichtigt werden, wenn ein Cookie platziert wird. Für weitere Informationen über diese Möglichkeiten beachten Sie die Anweisungen in der Hilfesektion Ihres Browsers.<\/p>\n        <p style=\"margin:0;font-size:16px;line-height:1.85;color:#a8a8a8\">Bitte nehmen Sie zur Kenntnis, dass unsere Website möglicherweise nicht richtig funktioniert, wenn alle Cookies deaktiviert sind. Wenn Sie die Cookies in Ihrem Browser löschen, werden diese neu platziert, wenn Sie unsere Website erneut besuchen.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">9. Ihre Rechte in Bezug auf personenbezogene Daten<\/h2>\n        <ul style=\"margin:0;padding-left:20px;font-size:16px;line-height:1.85;color:#a8a8a8;display:flex;flex-direction:column;gap:10px\">\n          <li>Sie haben das Recht zu erfahren, warum Ihre personenbezogenen Daten benötigt werden, was damit passiert und wie lange sie aufbewahrt werden.<\/li>\n          <li>Auskunftsrecht: Sie haben das Recht, Ihre uns bekannten persönlichen Daten einzusehen.<\/li>\n          <li>Recht auf Berichtigung: Sie haben das Recht, wann immer Sie wünschen, Ihre personenbezogenen Daten zu ergänzen, zu korrigieren sowie gelöscht oder blockiert zu bekommen.<\/li>\n          <li>Wenn Sie uns Ihre Einwilligung zur Verarbeitung Ihrer Daten erteilen, haben Sie das Recht, diese Einwilligung zu widerrufen und Ihre personenbezogenen Daten löschen zu lassen.<\/li>\n          <li>Recht auf Datenübertragbarkeit: Sie haben das Recht, alle Ihre personenbezogenen Daten von dem Verantwortlichen anzufordern und sie vollständig an einen anderen Verantwortlichen zu übermitteln.<\/li>\n          <li>Widerspruchsrecht: Sie können der Verarbeitung Ihrer Daten widersprechen. Wir entsprechen dem, es sei denn, es gibt berechtigte Gründe für die Verarbeitung.<\/li>\n        <\/ul>\n        <p style=\"margin:18px 0 0;font-size:16px;line-height:1.85;color:#a8a8a8\">Um diese Rechte auszuüben, kontaktieren Sie uns bitte über die Kontaktdaten am Ende dieser Cookie-Erklärung. Wenn Sie eine Beschwerde darüber haben, wie wir Ihre Daten behandeln, würden wir diese gerne hören, aber Sie haben auch das Recht, diese an die Aufsichtsbehörde (Datenschutzbehörde) zu richten.<\/p>\n      <\/section>\n\n      <section>\n        <h2 style=\"margin:0 0 16px;font-family:'Saira SemiCondensed','Saira',sans-serif;font-weight:600;font-size:22px;letter-spacing:.4px;text-transform:uppercase;color:#fff\">10. Kontaktdaten<\/h2>\n        <p style=\"mar
